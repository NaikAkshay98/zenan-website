<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promotions — Zenan Glass</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scrollbar-width: none; }
    html::-webkit-scrollbar { display: none; }

    :root {
      --blue:  #2558B0;
      --blue2: #3b82f6;
      --dark:  #0f172a;
      --body:  #334155;
      --muted: #64748b;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font); color: var(--body); background: transparent; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

    #bgCanvas, #bgCanvasWhite { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; transition: opacity .5s; }
    #bgCanvasWhite { opacity: 0; }
    nav, main, footer { position: relative; z-index: 1; }
    body.white-bg { background: #fff !important; }
    body.white-bg #bgCanvas { opacity: 0; pointer-events: none; }
    body.white-bg #bgCanvasWhite { opacity: 1; }
    #bgToggleBtn { background: none; border: 1.5px solid rgba(37,88,176,.25); border-radius: 20px; padding: 5px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: .72rem; font-weight: 700; color: #1e3a6e; letter-spacing: .04em; margin-left: 8px; transition: border-color .2s, background .2s; flex-shrink: 0; }
    #bgToggleBtn:hover { border-color: var(--blue); background: rgba(37,88,176,.07); }

    .grad-text {
      background: linear-gradient(135deg, #2558B0 0%, #3b82f6 55%, #0891b2 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── REVEAL ── */
    .reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s cubic-bezier(.22,1,.36,1), transform .7s cubic-bezier(.22,1,.36,1); }
    .reveal.in { opacity: 1; transform: translateY(0); }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(5px) saturate(180%); -webkit-backdrop-filter: blur(5px) saturate(180%);
      border-bottom: 1px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 6vw; height: 68px;
      box-shadow: 0 2px 16px rgba(37,88,176,.06);
    }
    .logo-wrap { display: flex; align-items: center; text-decoration: none; }
    .logo-wrap img { height: 52px; width: auto; display: block; }
    .nav-links { display: flex; gap: 2px; list-style: none; margin-left: auto; }
    .nav-links a { color: #1e3a6e; text-decoration: none; font-size: .78rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 8px 16px; border-radius: 7px; transition: background .2s, color .2s; }
    .nav-links a:hover { background: rgba(37,88,176,.08); color: #2558B0; }
    .nav-links a.active { color: var(--blue); font-weight: 700; }
    .nav-promo-wrap { position: relative; display: inline-block; }
    .nav-new-badge { position: absolute; top: -13px; right: -10px; padding: 2px 6px; background: linear-gradient(135deg, rgba(255,80,60,.96) 0%, rgba(200,20,10,.92) 100%); color: #fff; font-size: .55rem; font-weight: 800; letter-spacing: .05em; border-radius: 4px; line-height: 1.5; text-transform: uppercase; white-space: nowrap; pointer-events: none; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: 1px solid rgba(255,160,140,.5); box-shadow: 0 1px 8px rgba(220,40,20,.45), inset 0 1px 0 rgba(255,255,255,.4); animation: badgePulse 2.5s ease-in-out infinite; }
    @keyframes badgePulse { 0%,100% { opacity:1; box-shadow: 0 1px 8px rgba(220,40,20,.45), inset 0 1px 0 rgba(255,255,255,.4); } 50% { opacity:.78; box-shadow: 0 2px 14px rgba(220,40,20,.55), inset 0 1px 0 rgba(255,255,255,.4); } }
    #navLoginBtn { color: #1e3a6e; text-decoration: none; font-size: .78rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 8px 16px; border-radius: 8px; transition: background .2s, color .2s; flex-shrink: 0; margin-left: 4px; }
    #navLoginBtn:hover { background: rgba(37,88,176,.08); color: #2558B0; }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; border: none; background: none; }
    .nav-hamburger span { display: block; width: 24px; height: 2px; background: var(--dark); border-radius: 2px; }
    @media (max-width: 640px) {
      .nav-hamburger { display: flex; }
      .nav-links { display: none; flex-direction: column; gap: 0; position: absolute; top: 68px; left: 0; right: 0; background: rgba(255,255,255,.92); backdrop-filter: blur(24px); padding: 8px 0 16px; box-shadow: 0 8px 30px rgba(37,88,176,.09); }
      .nav-links.open { display: flex; }
      .nav-links a { border-radius: 0; padding: 12px 6vw; }
    }

    /* ── HERO ── */
    .hero { padding: 80px 6vw 48px; text-align: center; }
    .hero-content { max-width: 700px; margin: 0 auto; }
    .hero h1 {
      font-size: clamp(2.6rem, 6vw, 4.2rem); font-weight: 900; color: #0f172a; line-height: 1.08; margin-bottom: 18px; letter-spacing: -.02em;
    }
    .hero p {
      font-size: 1.05rem; max-width: 480px; margin: 0 auto; line-height: 1.85; margin-bottom: 32px;
      background: linear-gradient(120deg, #1e3a6e 0%, #2558B0 40%, #3b82f6 70%, #60a5fa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      font-weight: 600; letter-spacing: .01em;
      filter: drop-shadow(0 1px 6px rgba(37,88,176,.12));
    }

    /* ── PROMOTIONS ── */
    main { overflow: visible; }
    .promos-section { padding: 0 6vw 80px; }
    .promos-list { display: flex; flex-direction: column; gap: 72px; max-width: 1200px; margin: 0 auto; }

    .promo-item {
      display: flex; flex-direction: row; align-items: center;
      gap: 60px;
    }
    .promo-item-image { flex: 0 0 58%; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(10,30,80,.18); }
    .promo-item-image img { width: 100%; height: auto; display: block; transition: transform .4s; }
    .promo-item:hover .promo-item-image img { transform: scale(1.02); }
    .promo-item-footer { margin-top: auto;
      flex: 1;
      display: flex; flex-direction: column; justify-content: center;
    }
    .promo-item-title { font-size: 1.8rem; font-weight: 900; color: #0f1e50; margin-bottom: 18px; letter-spacing: -.01em; }
    .promo-item-desc { font-size: 1rem; color: #1a2e6e; line-height: 1.8; }
    @media (max-width: 720px) {
      .promo-item { flex-direction: column; gap: 28px; }
      .promo-item-image { flex: none; width: 100%; }
      .promo-item-title { font-size: 1.4rem; }
    }

    .promo-pdf-block {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 60px 20px;
      background: linear-gradient(135deg, rgba(37,88,176,.04), rgba(59,130,246,.04));
    }
    .promo-pdf-block .pdf-icon { font-size: 4rem; line-height: 1; }
    .promo-pdf-block .pdf-label { font-size: .8rem; color: var(--muted); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }

    /* Empty state */
    .promos-empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .promos-empty .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .promos-empty p { font-size: 1rem; }


    /* ── FOOTER ── */
    footer { margin-top: auto;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(5px) saturate(180%); -webkit-backdrop-filter: blur(5px) saturate(180%);
      border-top: 1px solid rgba(255,255,255,.2);
      box-shadow: 0 -2px 16px rgba(37,88,176,.06);
      color: #0f172a; padding: 14px 6vw 12px; position: relative;
    }
    .footer-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 40px; padding-bottom: 36px; border-bottom: 1px solid rgba(37,88,176,.1); }
    .footer-logo { display: inline-flex; margin-bottom: 14px; }
    .footer-logo img { height: 46px; width: auto; display: block; }
    .footer-brand p { font-size: .88rem; line-height: 1.7; max-width: 280px; color: #0f172a; }
    .footer-col h4 { color: #0f172a; font-size: .83rem; font-weight: 700; margin-bottom: 14px; letter-spacing: .08em; text-transform: uppercase; }
    .footer-col ul { list-style: none; }
    .footer-col li { margin-bottom: 9px; font-size: .88rem; color: #0f172a; }
    .footer-col a { color: #0f172a; text-decoration: none; transition: color .2s; }
    .footer-col a:hover { color: #2558B0; }
    .footer-contact li { display: flex; gap: 8px; align-items: flex-start; }
    .footer-contact .ic { display: flex; align-items: center; margin-top: 3px; flex-shrink: 0; opacity: .5; }
    .footer-bottom { max-width: 1100px; margin: 22px auto 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; font-size: .8rem; color: #0f172a; }
    @media (max-width: 700px) { .footer-inner { grid-template-columns: 1fr; gap: 28px; } .footer-bottom { flex-direction: column; text-align: center; } }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="bgCanvasWhite"></canvas>

<nav>
  <a href="index.html" class="logo-wrap">
    <img src="brand_assets/Zenan logo.png" alt="Zenan Glass" />
  </a>
  <button class="nav-hamburger" aria-label="Toggle menu" onclick="toggleNav()">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Products</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="promotions.html" class="active"><span class="nav-promo-wrap">Promotions<span class="nav-new-badge">New</span></span></a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <a id="navLoginBtn" href="login.html">Log In</a>
<script>
(function(){
  var btn = document.getElementById('navLoginBtn');
  if (!btn) return;
  if (localStorage.getItem('zenan_session')) {
    btn.textContent = 'My Account'; btn.href = 'admin.html';
  } else if (sessionStorage.getItem('zenan_client_session')) {
    btn.textContent = 'My Account'; btn.href = 'client-portal.html';
  }
})();
</script>
<button id="bgToggleBtn" onclick="toggleBg()" title="Toggle background">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20z" fill="currentColor" stroke="none"/></svg>
  <span id="bgToggleLabel">White</span>
</button>
<script>
(function(){
  if (localStorage.getItem('zenan_bg') === 'white') {
    document.body.classList.add('white-bg');
    var l = document.getElementById('bgToggleLabel'); if(l) l.textContent = 'Original';
  }
  window.toggleBg = function() {
    var isWhite = document.body.classList.toggle('white-bg');
    localStorage.setItem('zenan_bg', isWhite ? 'white' : 'original');
    var l = document.getElementById('bgToggleLabel'); if(l) l.textContent = isWhite ? 'Original' : 'White';
  };
})();
</script>
</nav>

<main>

<!-- HERO -->
<section class="hero">
  <div class="hero-content reveal">
    <h1>Our <span style="color:#2558B0;">Promotions</span></h1>
    <p>Exclusive deals, seasonal specials, and new collections. Check here for the latest from Zenan Glass.</p>
  </div>
</section>

<!-- PROMOTIONS -->
<section class="promos-section">
  <div id="promosGrid"></div>
</section>

</main>

<!-- FOOTER -->
<div id="site-footer"></div>


<script>
  function toggleNav() { document.getElementById('navLinks').classList.toggle('open'); }
  document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open')));

// ── CANVAS BACKGROUND ──
  (function () {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, frame = 0;
    let mouse = { x: .5, y: .5 }, targetMouse = { x: .5, y: .5 };
    window.addEventListener('mousemove', e => { targetMouse.x = e.clientX/window.innerWidth; targetMouse.y = e.clientY/window.innerHeight; });
    const ripples = [];
    window.addEventListener('click', e => { ripples.push({ x: e.clientX, y: e.clientY, r: 0, alpha: .35, hue: 200 + Math.random()*30 }); });

    const orbs = [
      { x:.15, y:.1,  r:.32, hue:210, speed:.00018, phase:0,   gold:false, depth:1   },
      { x:.72, y:.25, r:.26, hue:195, speed:.00022, phase:1.8, gold:false, depth:.7  },
      { x:.45, y:.6,  r:.36, hue:220, speed:.00015, phase:3.4, gold:false, depth:1.2 },
      { x:.85, y:.7,  r:.24, hue:200, speed:.0002,  phase:0.9, gold:false, depth:.8  },
      { x:.3,  y:.85, r:.28, hue:185, speed:.00017, phase:2.3, gold:false, depth:1   },
      { x:.6,  y:.4,  r:.22, hue:230, speed:.00025, phase:4.1, gold:false, depth:.6  },
      { x:.9,  y:.35, r:.20, hue:205, speed:.00019, phase:1.1, gold:false, depth:.9  },
      { x:.2,  y:.55, r:.18, hue:215, speed:.00021, phase:2.7, gold:false, depth:1.1 },
      { x:.5,  y:.15, r:.15, hue:190, speed:.00023, phase:0.4, gold:false, depth:.75 },
    ];
    const beams = [
      { x:.25, y:.2,  angle:-.38, spread:.70, speed:.00105, phase:0,   hue:210, alpha:.18  },
      { x:.6,  y:.55, angle: .28, spread:.58, speed:.00082, phase:2.1, hue:198, alpha:.17  },
      { x:.8,  y:.15, angle:-.55, spread:.65, speed:.00124, phase:1.2, hue:222, alpha:.16  },
      { x:.1,  y:.75, angle: .48, spread:.60, speed:.00091, phase:3.5, hue:190, alpha:.18  },
      { x:.5,  y:.9,  angle:-.22, spread:.82, speed:.00068, phase:0.7, hue:215, alpha:.15  },
      { x:.7,  y:.4,  angle: .15, spread:.50, speed:.00100, phase:1.9, hue:175, alpha:.16  },
      { x:.35, y:.5,  angle: .62, spread:.48, speed:.00115, phase:3.0, hue:195, alpha:.14  },
      { x:.15, y:.3,  angle: .35, spread:.65, speed:.00077, phase:4.2, hue:240, alpha:.15  },
      { x:.9,  y:.65, angle:-.42, spread:.72, speed:.00096, phase:1.5, hue:185, alpha:.14  },
      { x:.42, y:.08, angle: .58, spread:.55, speed:.00110, phase:2.8, hue:230, alpha:.13  },
      { x:.55, y:.72, angle:-.30, spread:.62, speed:.00088, phase:0.4, hue:260, alpha:.15  },
      { x:.22, y:.88, angle: .44, spread:.54, speed:.00118, phase:1.7, hue:260, alpha:.14  },
      { x:.78, y:.32, angle:-.18, spread:.68, speed:.00074, phase:3.3, hue:260, alpha:.16  },
    ];
    const facets = Array.from({ length: 85 }, () => ({
      x: Math.random(), y: Math.random(),
      s: 8 + Math.random() * 62,
      sides: [3,4,6][Math.floor(Math.random()*3)],
      rot: Math.random() * Math.PI * 2,
      rspeed: (Math.random()-.5) * .006,
      alpha: .045 + Math.random() * .13,
      hue: [190,210,225,240,175,260][Math.floor(Math.random()*6)] + Math.random()*20,
      drift: { x: (Math.random()-.5)*.00058, y: (Math.random()-.5)*.00048 },
      depth: .5 + Math.random() * .8,
    }));
    const sparkles = Array.from({ length: 150 }, () => ({
      x: Math.random(), y: Math.random(),
      life: Math.random(), speed: .007 + Math.random() * .016,
      size: .8 + Math.random() * 3.5,
      hue: [200,215,175,240,260][Math.floor(Math.random()*5)] + Math.random()*20,
      type: Math.floor(Math.random()*3),
    }));
    const auroras = [
      { y:.08, amp:.06, freq:.0014, speed:.00026, hue:260, alpha:.17 },
      { y:.22, amp:.07, freq:.0012, speed:.00025, hue:205, alpha:.20 },
      { y:.40, amp:.06, freq:.0015, speed:.00031, hue:240, alpha:.18 },
      { y:.58, amp:.08, freq:.001,  speed:.00021, hue:175, alpha:.17 },
      { y:.72, amp:.05, freq:.0018, speed:.00035, hue:215, alpha:.16 },
      { y:.84, amp:.06, freq:.0016, speed:.00028, hue:260, alpha:.15 },
      { y:.95, amp:.04, freq:.0022, speed:.00027, hue:195, alpha:.14 },
    ];
    const strips = [
      { x1:.0,  y1:.10, x2:.55, y2:.0,  hue:260, a:.14, sp:.00020 },
      { x1:.0,  y1:.15, x2:.60, y2:.0,  hue:210, a:.15, sp:.00020 },
      { x1:.0,  y1:.35, x2:.85, y2:.0,  hue:240, a:.13, sp:.00026 },
      { x1:.0,  y1:.50, x2:.90, y2:.08, hue:260, a:.14, sp:.00018 },
      { x1:.0,  y1:.58, x2:1.0, y2:.12, hue:175, a:.14, sp:.00017 },
      { x1:.0,  y1:.78, x2:1.0, y2:.35, hue:220, a:.12, sp:.00023 },
      { x1:.12, y1:1.0, x2:.95, y2:.18, hue:260, a:.13, sp:.00021 },
      { x1:.18, y1:1.0, x2:1.0, y2:.22, hue:195, a:.13, sp:.00028 },
      { x1:.42, y1:1.0, x2:1.0, y2:.52, hue:230, a:.12, sp:.00022 },
      { x1:.65, y1:1.0, x2:1.0, y2:.70, hue:205, a:.11, sp:.00024 },
      { x1:.82, y1:1.0, x2:1.0, y2:.88, hue:260, a:.10, sp:.00019 },
    ];

    function drawDiagonalLines() {
      strips.forEach((l,i) => {
        const pulse = Math.sin(frame*l.sp*1000 + i*1.4)*.35+.65;
        const x1=l.x1*W, y1=l.y1*H, x2=l.x2*W, y2=l.y2*H;
        const g=ctx.createLinearGradient(x1,y1,x2,y2);
        g.addColorStop(0,`hsla(${l.hue},92%,78%,0)`);
        g.addColorStop(.28,`hsla(${l.hue},95%,82%,${l.a*pulse})`);
        g.addColorStop(.5,`hsla(${l.hue},98%,88%,${l.a*pulse*1.6})`);
        g.addColorStop(.72,`hsla(${l.hue},95%,82%,${l.a*pulse})`);
        g.addColorStop(1,`hsla(${l.hue},92%,78%,0)`);
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
        ctx.strokeStyle=g; ctx.lineWidth=3.2; ctx.stroke();
        const ox=(y2-y1)/Math.sqrt((x2-x1)**2+(y2-y1)**2)*10;
        const oy=-(x2-x1)/Math.sqrt((x2-x1)**2+(y2-y1)**2)*10;
        const g2=ctx.createLinearGradient(x1+ox,y1+oy,x2+ox,y2+oy);
        g2.addColorStop(0,`hsla(${l.hue+20},88%,72%,0)`);
        g2.addColorStop(.5,`hsla(${l.hue+20},90%,78%,${l.a*pulse*.55})`);
        g2.addColorStop(1,`hsla(${l.hue+20},88%,72%,0)`);
        ctx.beginPath(); ctx.moveTo(x1+ox,y1+oy); ctx.lineTo(x2+ox,y2+oy);
        ctx.strokeStyle=g2; ctx.lineWidth=1.2; ctx.stroke();
      });
    }
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function drawAurora(a) {
      const t = frame * a.speed;
      ctx.beginPath();
      ctx.moveTo(0, a.y * H);
      for(let x=0; x<=W; x+=8){
        const y = (a.y + Math.sin(x*a.freq + t)*a.amp + Math.sin(x*a.freq*.6 + t*1.4)*a.amp*.5)*H;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      const g = ctx.createLinearGradient(0,a.y*H-60,0,a.y*H+60);
      g.addColorStop(0,`hsla(${a.hue},75%,80%,0)`);
      g.addColorStop(.5,`hsla(${a.hue},80%,82%,${a.alpha})`);
      g.addColorStop(1,`hsla(${a.hue},75%,80%,0)`);
      ctx.fillStyle = g; ctx.fill();
    }
    function drawOrb(o) {
      const t = frame*o.speed+o.phase;
      const mx = (mouse.x-.5)*o.depth*.055, my = (mouse.y-.5)*o.depth*.055;
      const cx = (o.x + Math.sin(t)*.09 + mx)*W;
      const cy = (o.y + Math.cos(t*1.3)*.07 + my)*H;
      const rad = o.r*Math.min(W,H);
      const g = ctx.createRadialGradient(cx-rad*.2,cy-rad*.2,0, cx,cy,rad);
      g.addColorStop(0,`hsla(${o.hue},75%,82%,.16)`);
      g.addColorStop(.4,`hsla(${o.hue},70%,83%,.08)`);
      g.addColorStop(.75,`hsla(${o.hue},65%,86%,.03)`);
      g.addColorStop(1,`hsla(${o.hue},60%,88%,0)`);
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
      const hg = ctx.createRadialGradient(cx-rad*.3,cy-rad*.3,0,cx-rad*.3,cy-rad*.3,rad*.45);
      hg.addColorStop(0,`rgba(255,255,255,.07)`); hg.addColorStop(1,`rgba(255,255,255,0)`);
      ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
    }
    function drawBeam(b) {
      const t=frame*b.speed+b.phase;
      const mx=(mouse.x-.5)*.04, my=(mouse.y-.5)*.04;
      const cx=(b.x+Math.sin(t*.7)*.08+mx)*W, cy=(b.y+Math.cos(t*.5)*.06+my)*H;
      const angle=b.angle+Math.sin(t)*.14, len=b.spread*W*1.8;
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
      const bw=60+Math.sin(t*1.3)*26;
      const g=ctx.createLinearGradient(-len/2,0,len/2,0);
      g.addColorStop(0,`hsla(${b.hue},80%,78%,0)`);
      g.addColorStop(.2,`hsla(${b.hue},82%,80%,${b.alpha*.6})`);
      g.addColorStop(.5,`hsla(${b.hue},88%,85%,${b.alpha*1.8})`);
      g.addColorStop(.8,`hsla(${b.hue},82%,80%,${b.alpha*.6})`);
      g.addColorStop(1,`hsla(${b.hue},80%,78%,0)`);
      ctx.fillStyle=g; ctx.fillRect(-len/2,-bw/2,len,bw); ctx.restore();
    }
    function drawFacet(f) {
      f.rot+=f.rspeed; f.x+=f.drift.x; f.y+=f.drift.y;
      if(f.x<-.05)f.x=1.05; if(f.x>1.05)f.x=-.05;
      if(f.y<-.05)f.y=1.05; if(f.y>1.05)f.y=-.05;
      const mx=(mouse.x-.5)*f.depth*.025, my=(mouse.y-.5)*f.depth*.025;
      ctx.save(); ctx.translate((f.x+mx)*W, (f.y+my)*H); ctx.rotate(f.rot);
      ctx.beginPath();
      for(let i=0;i<f.sides;i++){
        const a=(i/f.sides)*Math.PI*2-(f.sides===6?0:Math.PI/2);
        const r=f.s*(.62+.38*Math.abs(Math.cos(a*(f.sides===3?1.5:2))));
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();
      const g=ctx.createLinearGradient(-f.s,-f.s,f.s,f.s);
      g.addColorStop(0,`hsla(${f.hue},82%,94%,${f.alpha*2})`);
      g.addColorStop(.45,`hsla(${f.hue},74%,90%,${f.alpha})`);
      g.addColorStop(1,`hsla(${f.hue},68%,86%,${f.alpha*.3})`);
      ctx.fillStyle=g; ctx.fill();
      ctx.strokeStyle=`hsla(${f.hue},65%,78%,${f.alpha*.85})`; ctx.lineWidth=.8; ctx.stroke();
      ctx.beginPath();
      for(let i=0;i<f.sides;i++){
        const a=(i/f.sides)*Math.PI*2-(f.sides===6?0:Math.PI/2);
        const r=f.s*.4*(.62+.38*Math.abs(Math.cos(a*(f.sides===3?1.5:2))));
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();
      ctx.strokeStyle=`rgba(255,255,255,${f.alpha*1.2})`; ctx.lineWidth=.5; ctx.stroke();
      ctx.restore();
    }
    function drawMesh() {
      const pts = facets.map(f=>({x:f.x*W,y:f.y*H,hue:f.hue,alpha:f.alpha}));
      for(let i=0;i<pts.length;i++){
        for(let j=i+1;j<pts.length;j++){
          const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
          if(d<180){
            const a = .055*(1-d/180);
            const g=ctx.createLinearGradient(pts[i].x,pts[i].y,pts[j].x,pts[j].y);
            g.addColorStop(0,`hsla(${pts[i].hue},65%,75%,${a})`);
            g.addColorStop(1,`hsla(${pts[j].hue},65%,75%,${a})`);
            ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
            ctx.strokeStyle=g; ctx.lineWidth=.6; ctx.stroke();
          }
        }
      }
    }
    function drawSparkle(s) {
      s.life += s.speed;
      if(s.life>1){ s.life=0; s.x=Math.random(); s.y=Math.random(); }
      const a = Math.sin(s.life*Math.PI);
      const px=s.x*W, py=s.y*H;
      ctx.save(); ctx.globalAlpha = a*.65;
      if(s.type===0){
        ctx.fillStyle=`hsla(${s.hue},82%,88%,1)`;
        ctx.beginPath(); ctx.arc(px,py,s.size*a,0,Math.PI*2); ctx.fill();
      } else if(s.type===1){
        ctx.strokeStyle=`hsla(${s.hue},78%,84%,1)`; ctx.lineWidth=.7;
        const sz=s.size*3*a;
        ctx.beginPath(); ctx.moveTo(px-sz,py); ctx.lineTo(px+sz,py); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px,py-sz); ctx.lineTo(px,py+sz); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px-sz*.7,py-sz*.7); ctx.lineTo(px+sz*.7,py+sz*.7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px+sz*.7,py-sz*.7); ctx.lineTo(px-sz*.7,py+sz*.7); ctx.stroke();
      } else {
        ctx.fillStyle=`hsla(${s.hue},85%,90%,1)`;
        const sz=s.size*2.5*a;
        ctx.beginPath(); ctx.moveTo(px,py-sz); ctx.lineTo(px+sz*.6,py); ctx.lineTo(px,py+sz); ctx.lineTo(px-sz*.6,py); ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }
    function drawRipples() {
      for(let i=ripples.length-1;i>=0;i--){
        const r=ripples[i];
        r.r += 4; r.alpha -= .008;
        if(r.alpha<=0){ ripples.splice(i,1); continue; }
        ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
        ctx.strokeStyle=`hsla(${r.hue},70%,75%,${r.alpha})`; ctx.lineWidth=1.5; ctx.stroke();
        ctx.beginPath(); ctx.arc(r.x,r.y,r.r*.6,0,Math.PI*2);
        ctx.strokeStyle=`hsla(${r.hue},75%,80%,${r.alpha*.6})`; ctx.lineWidth=.8; ctx.stroke();
      }
    }
    function draw() {
      frame++;
      mouse.x += (targetMouse.x - mouse.x) * .04;
      mouse.y += (targetMouse.y - mouse.y) * .04;
      ctx.clearRect(0,0,W,H);
      const bx = W*(0.5 + (mouse.x-.5)*.15), by = H*(0.4 + (mouse.y-.5)*.1);
      const base = ctx.createRadialGradient(bx, by*.6, 0, W*.5, H*.5, Math.max(W,H)*.92);
      base.addColorStop(0,'rgba(215,235,255,1)');
      base.addColorStop(.22,'rgba(192,220,255,1)');
      base.addColorStop(.45,'rgba(158,200,252,1)');
      base.addColorStop(.65,'rgba(118,170,240,1)');
      base.addColorStop(.82,'rgba(78,132,225,1)');
      base.addColorStop(.92,'rgba(50,95,200,1)');
      base.addColorStop(1,'rgba(32,65,170,1)');
      ctx.fillStyle=base; ctx.fillRect(0,0,W,H);
      const vig = ctx.createRadialGradient(W*.5,H*.5,Math.min(W,H)*.2, W*.5,H*.5,Math.max(W,H)*.85);
      vig.addColorStop(0,'rgba(10,30,80,0)');
      vig.addColorStop(.50,'rgba(10,30,80,.08)');
      vig.addColorStop(.78,'rgba(8,22,70,.22)');
      vig.addColorStop(1,'rgba(4,12,50,.38)');
      ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
      auroras.forEach(drawAurora);
      drawDiagonalLines();
      drawMesh();
      orbs.forEach(drawOrb);
      beams.forEach(drawBeam);
      facets.forEach(drawFacet);
      sparkles.forEach(drawSparkle);
      drawRipples();
      requestAnimationFrame(draw);
    }
    draw();
  })();

  // ── WHITE CANVAS BACKGROUND ──
  (function () {
    const canvas = document.getElementById('bgCanvasWhite');
    const ctx = canvas.getContext('2d');
    let W, H, frame = 0;
    let mouse = { x:.5, y:.5 }, targetMouse = { x:.5, y:.5 };
    window.addEventListener('mousemove', e => { targetMouse.x = e.clientX/window.innerWidth; targetMouse.y = e.clientY/window.innerHeight; });
    const ripples = [];
    window.addEventListener('click', e => { if(document.body.classList.contains('white-bg')) ripples.push({ x:e.clientX, y:e.clientY, r:0, alpha:.20 }); });

    const orbs = [
      { x:.15, y:.1,  r:.32, speed:.00018, phase:0,   depth:1   },
      { x:.72, y:.25, r:.26, speed:.00022, phase:1.8, depth:.7  },
      { x:.45, y:.6,  r:.36, speed:.00015, phase:3.4, depth:1.2 },
      { x:.85, y:.7,  r:.24, speed:.0002,  phase:0.9, depth:.8  },
      { x:.3,  y:.85, r:.28, speed:.00017, phase:2.3, depth:1   },
      { x:.6,  y:.4,  r:.22, speed:.00025, phase:4.1, depth:.6  },
    ];
    const beams = [
      { x:.25, y:.2, angle:-.38, spread:.70, speed:.00105, phase:0,   alpha:.06 },
      { x:.7,  y:.5, angle: .28, spread:.58, speed:.00082, phase:2.1, alpha:.055 },
      { x:.5,  y:.1, angle:-.22, spread:.82, speed:.00068, phase:0.7, alpha:.05  },
    ];
    const facets = Array.from({ length: 55 }, () => ({
      x:Math.random(), y:Math.random(), s:10+Math.random()*50,
      sides:[3,4,6][Math.floor(Math.random()*3)], rot:Math.random()*Math.PI*2,
      rspeed:(Math.random()-.5)*.004, alpha:.03+Math.random()*.06,
      drift:{x:(Math.random()-.5)*.0005,y:(Math.random()-.5)*.0004}, depth:.5+Math.random()*.8,
    }));
    const sparkles = Array.from({ length: 120 }, () => ({
      x:Math.random(), y:Math.random(), life:Math.random(), speed:.006+Math.random()*.014,
      size:.6+Math.random()*2.5, type:Math.floor(Math.random()*3),
    }));
    const auroras = [
      { y:.15, amp:.06, freq:.0012, speed:.00022, alpha:.08 },
      { y:.38, amp:.07, freq:.0014, speed:.00018, alpha:.10 },
      { y:.58, amp:.06, freq:.0016, speed:.00025, alpha:.08 },
      { y:.78, amp:.05, freq:.001,  speed:.00020, alpha:.09 },
    ];
    const strips = [
      { x1:.0,y1:.15,x2:.55,y2:.0, a:.07,sp:.00020 },
      { x1:.0,y1:.40,x2:.85,y2:.05,a:.065,sp:.00026},
      { x1:.0,y1:.65,x2:1.0,y2:.20,a:.06,sp:.00017 },
      { x1:.15,y1:1.0,x2:.90,y2:.22,a:.06,sp:.00021},
      { x1:.55,y1:1.0,x2:1.0,y2:.55,a:.055,sp:.00024},
    ];

    function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function drawAurora(a) {
      const t=frame*a.speed;
      ctx.beginPath(); ctx.moveTo(0,a.y*H);
      for(let x=0;x<=W;x+=8){ const y=(a.y+Math.sin(x*a.freq+t)*a.amp+Math.sin(x*a.freq*.6+t*1.4)*a.amp*.5)*H; ctx.lineTo(x,y); }
      ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
      const g=ctx.createLinearGradient(0,a.y*H-50,0,a.y*H+50);
      g.addColorStop(0,'rgba(255,255,255,0)');
      g.addColorStop(.5,`rgba(215,215,215,${a.alpha})`);
      g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=g; ctx.fill();
    }
    function drawOrb(o) {
      const t=frame*o.speed+o.phase;
      const mx=(mouse.x-.5)*o.depth*.055, my=(mouse.y-.5)*o.depth*.055;
      const cx=(o.x+Math.sin(t)*.09+mx)*W, cy=(o.y+Math.cos(t*1.3)*.07+my)*H;
      const rad=o.r*Math.min(W,H);
      const g=ctx.createRadialGradient(cx-rad*.2,cy-rad*.2,0,cx,cy,rad);
      g.addColorStop(0,'rgba(225,225,225,.18)');
      g.addColorStop(.4,'rgba(230,230,230,.09)');
      g.addColorStop(.75,'rgba(235,235,235,.04)');
      g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
    }
    function drawBeam(b) {
      const t=frame*b.speed+b.phase;
      const mx=(mouse.x-.5)*.03, my=(mouse.y-.5)*.03;
      const cx=(b.x+Math.sin(t*.7)*.06+mx)*W, cy=(b.y+Math.cos(t*.5)*.05+my)*H;
      const angle=b.angle+Math.sin(t)*.1, len=b.spread*W*1.8;
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
      const bw=50+Math.sin(t*1.3)*20;
      const g=ctx.createLinearGradient(-len/2,0,len/2,0);
      g.addColorStop(0,'rgba(255,255,255,0)');
      g.addColorStop(.5,`rgba(215,215,215,${b.alpha*2.0})`);
      g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=g; ctx.fillRect(-len/2,-bw/2,len,bw); ctx.restore();
    }
    function drawFacet(f) {
      f.rot+=f.rspeed; f.x+=f.drift.x; f.y+=f.drift.y;
      if(f.x<-.05)f.x=1.05; if(f.x>1.05)f.x=-.05;
      if(f.y<-.05)f.y=1.05; if(f.y>1.05)f.y=-.05;
      const mx=(mouse.x-.5)*f.depth*.02, my=(mouse.y-.5)*f.depth*.02;
      ctx.save(); ctx.translate((f.x+mx)*W,(f.y+my)*H); ctx.rotate(f.rot);
      ctx.beginPath();
      for(let i=0;i<f.sides;i++){
        const a=(i/f.sides)*Math.PI*2-(f.sides===6?0:Math.PI/2);
        const r=f.s*(.62+.38*Math.abs(Math.cos(a*(f.sides===3?1.5:2))));
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();
      const g=ctx.createLinearGradient(-f.s,-f.s,f.s,f.s);
      g.addColorStop(0,`rgba(228,228,228,${f.alpha*4})`);
      g.addColorStop(.45,`rgba(235,235,235,${f.alpha*2})`);
      g.addColorStop(1,`rgba(230,230,230,${f.alpha*1.5})`);
      ctx.fillStyle=g; ctx.fill();
      ctx.strokeStyle=`rgba(195,195,195,${f.alpha*3})`; ctx.lineWidth=.7; ctx.stroke();
      ctx.restore();
    }
    function drawMesh() {
      const pts=facets.map(f=>({x:f.x*W,y:f.y*H}));
      for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<180){ const a=.12*(1-d/180); ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.strokeStyle=`rgba(215,215,215,${a})`; ctx.lineWidth=.7; ctx.stroke(); }
      }
    }
    function drawStrips() {
      strips.forEach((l,i) => {
        const pulse=Math.sin(frame*l.sp*1000+i*1.4)*.3+.7;
        const x1=l.x1*W,y1=l.y1*H,x2=l.x2*W,y2=l.y2*H;
        const g=ctx.createLinearGradient(x1,y1,x2,y2);
        g.addColorStop(0,'rgba(215,215,215,0)');
        g.addColorStop(.5,`rgba(215,215,215,${l.a*pulse})`);
        g.addColorStop(1,'rgba(215,215,215,0)');
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
        ctx.strokeStyle=g; ctx.lineWidth=2; ctx.stroke();
      });
    }
    function drawSparkle(s) {
      s.life+=s.speed;
      if(s.life>1){ s.life=0; s.x=Math.random(); s.y=Math.random(); }
      const a=Math.sin(s.life*Math.PI), px=s.x*W, py=s.y*H;
      ctx.save(); ctx.globalAlpha=a*.60;
      if(s.type===0){
        ctx.fillStyle='rgba(195,195,195,1)'; ctx.beginPath(); ctx.arc(px,py,s.size*a,0,Math.PI*2); ctx.fill();
      } else if(s.type===1){
        ctx.strokeStyle='rgba(190,190,190,1)'; ctx.lineWidth=.6;
        const sz=s.size*3*a;
        ctx.beginPath(); ctx.moveTo(px-sz,py); ctx.lineTo(px+sz,py); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px,py-sz); ctx.lineTo(px,py+sz); ctx.stroke();
      } else {
        ctx.fillStyle='rgba(200,200,200,1)';
        const sz=s.size*2*a;
        ctx.beginPath(); ctx.moveTo(px,py-sz); ctx.lineTo(px+sz*.6,py); ctx.lineTo(px,py+sz); ctx.lineTo(px-sz*.6,py); ctx.closePath(); ctx.fill();
      }
      ctx.restore();
    }
    function drawRipples() {
      for(let i=ripples.length-1;i>=0;i--){
        const r=ripples[i]; r.r+=3; r.alpha-=.006;
        if(r.alpha<=0){ ripples.splice(i,1); continue; }
        ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(195,195,195,${r.alpha})`; ctx.lineWidth=1.2; ctx.stroke();
      }
    }
    function draw() {
      frame++;
      mouse.x+=(targetMouse.x-mouse.x)*.04; mouse.y+=(targetMouse.y-mouse.y)*.04;
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
      const vig=ctx.createRadialGradient(W*.5,H*.5,Math.min(W,H)*.3,W*.5,H*.5,Math.max(W,H)*.95);
      vig.addColorStop(0,'rgba(240,240,240,.02)'); vig.addColorStop(1,'rgba(215,215,215,.12)');
      ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
      auroras.forEach(drawAurora);
      drawStrips();
      drawMesh();
      orbs.forEach(drawOrb);
      beams.forEach(drawBeam);
      facets.forEach(drawFacet);
      sparkles.forEach(drawSparkle);
      drawRipples();
      requestAnimationFrame(draw);
    }
    draw();
  })();

  // ── SCROLL REVEAL ──
  const revealObs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (!e.isIntersecting) return; e.target.classList.add('in'); revealObs.unobserve(e.target); });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

  // ── PROMOTIONS ──
  // Add your flyers here. Each entry needs: title, src (image URL or PDF URL), fileType ('image/jpeg' or 'application/pdf')
  const PROMOTIONS = [
    { title: 'Soccer Collection', src: 'brand_assets/soccer-flyer.jpg', fileType: 'image/jpeg', desc: 'Celebrate the beautiful game in style. Our soccer-themed glassware — from the iconic World Cup Tumbler to the fan-favourite Boot glass — makes every match night unforgettable. Perfect for bars, restaurants, and branded giveaways. Custom logos available on all styles.' },
  ];

  function loadPromotions() {
    const grid = document.getElementById('promosGrid');
    if (!PROMOTIONS.length) {
      grid.innerHTML = '<div class="promos-empty"><div class="empty-icon">🏷️</div><p>No promotions available right now. Check back soon!</p></div>';
      return;
    }
    grid.innerHTML = '<div class="promos-list">' + PROMOTIONS.map((p, i) => {
      const isImage = p.fileType && p.fileType.startsWith('image/');
      return `
        <div class="promo-item">
          ${isImage
            ? `<div class="promo-item-image"><img src="${p.src}" alt="${p.title}" /></div>`
            : `<div class="promo-item-image promo-pdf-block"><div class="pdf-icon">📄</div><div class="pdf-label">PDF Flyer</div></div>`
          }
          <div class="promo-item-footer">
            <div class="promo-item-title">${p.title}</div>
            <div class="promo-item-desc">${p.desc || ''}</div>
          </div>
        </div>`;
    }).join('') + '</div>';
  }


  loadPromotions();
</script>
<script>
  fetch('footer.html').then(r => r.text()).then(html => { document.getElementById('site-footer').outerHTML = html; });
</script>
